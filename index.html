<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Weight Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080b10;min-height:100vh}
body{color:#d4edd8;font-family:'DM Mono',monospace;padding-bottom:80px}

.header{padding:48px 24px 24px;border-bottom:1px solid rgba(120,220,140,.12);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(80,200,100,.08) 0%,transparent 70%);pointer-events:none}
.header-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#78dc8c;margin-bottom:8px;opacity:.7}
.header h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#e8f5ea;line-height:1.1}
.header h1 span{color:#78dc8c}

.section{margin:20px 16px 0;background:rgba(255,255,255,.03);border:1px solid rgba(120,220,140,.1);border-radius:16px;padding:18px;position:relative}
.sec-label{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#78dc8c;margin-bottom:14px;opacity:.8}

.row{display:flex;gap:10px;align-items:center}
input[type=date],input[type=number]{
  background:rgba(120,220,140,.06);border:1px solid rgba(120,220,140,.22);border-radius:10px;
  color:#d4edd8;padding:13px 14px;font-family:'DM Mono',monospace;font-size:15px;
  flex:1;outline:none;color-scheme:dark;-webkit-appearance:none;appearance:none;width:100%
}
input:focus{border-color:#78dc8c}
input::placeholder{color:rgba(180,220,185,.3)}

.btn{border:none;border-radius:10px;color:#fff;padding:13px 16px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-green{background:linear-gradient(135deg,#3cb862,#2a9446)}
.btn-amber{background:linear-gradient(135deg,#c4903a,#a06820)}
.btn-ghost{background:none;border:1px solid rgba(120,220,140,.3);color:#78dc8c;border-radius:8px;padding:13px 14px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
.btn-edit{position:absolute;top:16px;right:16px;background:none;border:1px solid rgba(220,80,80,.3);color:rgba(220,80,80,.6);border-radius:8px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px}
.btn-edit.on{background:rgba(220,80,80,.15);color:#e06060;border-color:rgba(220,80,80,.6)}
.btn-del{background:none;border:1px solid rgba(220,80,80,.3);color:rgba(220,80,80,.6);border-radius:6px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;font-family:monospace}

.big-num{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;line-height:1}
.big-unit{font-size:15px;opacity:.7;margin-left:4px}
.big-row{display:flex;align-items:baseline;margin-bottom:14px}
.hint{font-size:11px;color:rgba(180,220,185,.4);margin-bottom:12px}

.entries{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:6px;max-height:230px;overflow-y:auto}
.entry{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(120,220,140,.08);border-radius:9px;padding:10px 12px}
.entry-left{display:flex;flex-direction:column;gap:2px}
.entry-time{color:rgba(180,220,185,.4);font-size:10px}
.entry-val{font-size:15px;font-weight:500}

.divider{border-top:1px solid rgba(120,220,140,.08);margin-top:16px;padding-top:14px}
.sub-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(120,220,140,.5);margin-bottom:10px}
.chart-box{height:180px;margin-top:4px}
.no-data{height:90px;display:flex;align-items:center;justify-content:center;color:rgba(180,220,185,.22);font-size:12px;letter-spacing:1px}

.log-list{display:flex;flex-direction:column;gap:6px;max-height:190px;overflow-y:auto}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(120,220,140,.08);border-radius:8px;font-size:13px}
.log-date{color:rgba(180,220,185,.5)}
.log-val{color:#78dc8c;font-weight:500}
.badge{background:rgba(120,220,140,.12);color:#78dc8c;border-radius:4px;padding:2px 6px;font-size:10px;margin-left:6px}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stat{background:rgba(255,255,255,.025);border:1px solid rgba(120,220,140,.08);border-radius:10px;padding:12px}
.stat-l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(180,220,185,.4);margin-bottom:4px}
.stat-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#78dc8c}
.stat-v.amber{color:#f0c060}.stat-v.red{color:#e07070}.stat-v.muted{color:#9ecba5}

#flash{
  display:none;position:fixed;top:18px;left:50%;transform:translateX(-50%);
  background:#0f1f14;border:1px solid #78dc8c;color:#78dc8c;
  padding:10px 22px;border-radius:30px;font-size:13px;z-index:999;white-space:nowrap;
  transition:opacity .2s
}
#flash.err{border-color:#e07070;color:#e07070;background:#1f0f0f}
</style>
</head>
<body>

<div id="flash"></div>

<div class="header">
  <div class="header-tag">Body Metrics</div>
  <h1>Weight<br><span>Tracker</span></h1>
</div>

<!-- DATE -->
<div class="section">
  <div class="sec-label">Selected Date</div>
  <div class="row">
    <input type="date" id="datePicker"/>
    <button class="btn-ghost" onclick="setToday()">Today</button>
  </div>
</div>

<!-- CALORIES -->
<div class="section">
  <div class="sec-label">Calories — <span id="calDateLabel"></span></div>
  <div class="big-row">
    <span class="big-num" id="calTotal">0</span>
    <span class="big-unit" id="calUnit">kcal</span>
  </div>
  <div class="row">
    <input type="number" id="calInput" placeholder="Add kcal eaten…" min="1" max="10000"/>
    <button class="btn btn-amber" onclick="addCalories()">+ Add</button>
  </div>
  <ul class="entries" id="calEntries"></ul>
  <div class="divider" id="calChartWrap" style="display:none">
    <div class="sub-label">Calories Chart</div>
    <div class="chart-box"><canvas id="calChart"></canvas></div>
  </div>
</div>

<!-- WEIGHT -->
<div class="section">
  <button class="btn-edit" id="editBtn" onclick="toggleEdit()">✎ edit</button>
  <div class="sec-label">Weight Log</div>
  <div class="big-row" id="weightDisplay" style="display:none">
    <span class="big-num" id="weightBig" style="color:#78dc8c"></span>
    <span class="big-unit" style="color:#6ba870">kg</span>
  </div>
  <div class="hint" id="weightHint"></div>
  <div class="row">
    <input type="number" id="weightInput" placeholder="e.g. 75.4" step="0.1" min="20" max="300"/>
    <button class="btn btn-green" onclick="saveWeight()">Save kg</button>
  </div>
  <div class="stats-grid" id="statsGrid" style="display:none">
    <div class="stat"><div class="stat-l">Starting</div><div class="stat-v muted" id="sStart"></div></div>
    <div class="stat"><div class="stat-l">Change</div><div class="stat-v" id="sChange"></div></div>
    <div class="stat"><div class="stat-l">Lowest</div><div class="stat-v" id="sLow"></div></div>
    <div class="stat"><div class="stat-l">Entries</div><div class="stat-v muted" id="sCount"></div></div>
  </div>
  <div class="divider">
    <div class="sub-label">Weight Chart</div>
    <div id="weightChartWrap" style="display:none"><div class="chart-box"><canvas id="weightChart"></canvas></div></div>
    <div class="no-data" id="weightNoData">Add 2+ entries to see your chart</div>
  </div>
  <div class="divider" id="logWrap" style="display:none">
    <div class="sub-label">All Entries</div>
    <div class="log-list" id="weightLog"></div>
  </div>
</div>

<script>
const KEY = 'wt_data_v1';
let db = load();
let editMode = false;
let wChart = null;
let cChart = null;

function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || {weights:{},calories:{}}; }
  catch{ return {weights:{},calories:{}}; }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(db)); }catch{} }

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(d){
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y.slice(2)}`;
}
function nowTime(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function calColor(kcal){
  const t = Math.min(Math.max(kcal,0)/1500,1);
  const hue = Math.round(120 - 120*t);
  const sat = Math.round(62 + 20*t);
  const light = Math.round(58 - 4*t);
  return `hsl(${hue},${sat}%,${light}%)`;
}

let flashTimer;
function flash(msg, err=false){
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.className = err ? 'err' : '';
  el.style.display = 'block';
  el.style.opacity = '1';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.style.display='none',200); }, 2000);
}

function getDate(){ return document.getElementById('datePicker').value; }

function setToday(){
  document.getElementById('datePicker').value = todayStr();
  render();
}

function toggleEdit(){
  editMode = !editMode;
  const btn = document.getElementById('editBtn');
  btn.textContent = editMode ? '✕ exit edit' : '✎ edit';
  btn.className = editMode ? 'btn-edit on' : 'btn-edit';
  renderWeightLog();
}

/* ---- CALORIES ---- */
function addCalories(){
  const inp = document.getElementById('calInput');
  const val = parseFloat(inp.value.replace(',','.'));
  if(!val || val<=0 || val>10000) return flash('Enter valid kcal (1–10 000)', true);
  const date = getDate();
  if(!db.calories[date]) db.calories[date] = [];
  db.calories[date].push({ id: Date.now(), amount: val, time: nowTime() });
  inp.value = '';
  save();
  renderCalories();
  flash(`+${val} kcal added ✓`);
}

function deleteCal(date, id){
  db.calories[date] = (db.calories[date]||[]).filter(e=>e.id!==id);
  save();
  renderCalories();
  renderCalChart();
}

function renderCalories(){
  const date = getDate();
  document.getElementById('calDateLabel').textContent = fmtDate(date);
  const entries = db.calories[date] || [];
  const total = entries.reduce((s,e)=>s+e.amount, 0);
  const color = calColor(total);
  document.getElementById('calTotal').textContent = total.toLocaleString();
  document.getElementById('calTotal').style.color = color;
  document.getElementById('calUnit').style.color = color;

  const ul = document.getElementById('calEntries');
  ul.innerHTML = '';
  let running = 0;
  [...entries].reverse().forEach(entry => {
    // compute running total for this entry (from the bottom up means we sum from start)
    // we need forward running total, so recalc
  });
  // forward pass for colors
  let fwd = 0;
  const colored = entries.map(e => { fwd += e.amount; return {...e, runColor: calColor(fwd)}; });
  [...colored].reverse().forEach(entry => {
    const li = document.createElement('li');
    li.className = 'entry';
    li.innerHTML = `
      <div class="entry-left">
        <span class="entry-time">${entry.time}</span>
        <span class="entry-val" style="color:${entry.runColor}">+${entry.amount} kcal</span>
      </div>
      <button class="btn-del" onclick="deleteCal('${date}',${entry.id})">✕</button>`;
    ul.appendChild(li);
  });
}

/* ---- WEIGHT ---- */
function saveWeight(){
  const inp = document.getElementById('weightInput');
  const val = parseFloat(inp.value.replace(',','.'));
  if(!val || val<20 || val>300) return flash('Enter a valid weight (20–300 kg)', true);
  db.weights[getDate()] = val;
  inp.value = '';
  save();
  renderWeight();
  renderWeightChart();
  flash('Weight saved ✓');
}

function deleteWeight(date){
  delete db.weights[date];
  save();
  renderWeight();
  renderWeightChart();
}

function renderWeight(){
  const date = getDate();
  const w = db.weights[date];
  const display = document.getElementById('weightDisplay');
  const hint = document.getElementById('weightHint');
  if(w){
    display.style.display = 'flex';
    document.getElementById('weightBig').textContent = w;
    hint.style.display = 'none';
  } else {
    display.style.display = 'none';
    hint.style.display = 'block';
    hint.textContent = `No weight recorded for ${fmtDate(date)}`;
  }
  renderStats();
  renderWeightLog();
}

function renderStats(){
  const entries = Object.entries(db.weights).sort(([a],[b])=>a.localeCompare(b));
  const grid = document.getElementById('statsGrid');
  if(entries.length < 2){ grid.style.display='none'; return; }
  grid.style.display = 'grid';
  const first = parseFloat(entries[0][1]);
  const last = parseFloat(entries[entries.length-1][1]);
  const diff = (last - first).toFixed(1);
  const vals = entries.map(e=>parseFloat(e[1]));
  const minW = Math.min(...vals);
  document.getElementById('sStart').textContent = first+' kg';
  const sChange = document.getElementById('sChange');
  sChange.textContent = (diff>0?'+':'')+diff+' kg';
  sChange.className = 'stat-v '+(diff<0?'red':'amber');
  document.getElementById('sLow').textContent = minW+' kg';
  document.getElementById('sCount').textContent = entries.length;
}

function renderWeightLog(){
  const wrap = document.getElementById('logWrap');
  const entries = Object.entries(db.weights).sort(([a],[b])=>b.localeCompare(a));
  if(!entries.length){ wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  const list = document.getElementById('weightLog');
  list.innerHTML = '';
  entries.forEach(([date, w]) => {
    const div = document.createElement('div');
    div.className = 'log-row';
    const isToday = date === todayStr();
    div.innerHTML = `
      <span class="log-date">${fmtDate(date)}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="log-val">${w} kg</span>
        ${isToday ? '<span class="badge">today</span>' : ''}
        ${editMode ? `<button class="btn-del" onclick="deleteWeight('${date}')">✕</button>` : ''}
      </div>`;
    list.appendChild(div);
  });
}

/* ---- CHARTS ---- */
const chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false }, tooltip: {
    backgroundColor: 'rgba(10,12,18,0.95)',
    titleFont: { family: 'DM Mono', size: 11 },
    bodyFont: { family: 'DM Mono', size: 12 },
    padding: 10, cornerRadius: 8,
    callbacks: { title: items => fmtDate(items[0].label) }
  }},
  scales: {
    x: { grid: { color: 'rgba(120,220,140,0.07)' }, ticks: { color: 'rgba(180,220,185,0.45)', font: { family:'DM Mono', size:9 }, maxTicksLimit:6, callback: function(v){ return fmtDate(this.getLabelForValue(v)); } } },
    y: { grid: { color: 'rgba(120,220,140,0.07)' }, ticks: { color: 'rgba(180,220,185,0.45)', font: { family:'DM Mono', size:9 } } }
  }
};

function renderWeightChart(){
  const entries = Object.entries(db.weights).sort(([a],[b])=>a.localeCompare(b));
  const wrap = document.getElementById('weightChartWrap');
  const noData = document.getElementById('weightNoData');
  if(entries.length < 2){ wrap.style.display='none'; noData.style.display='flex'; return; }
  wrap.style.display = 'block'; noData.style.display = 'none';
  const labels = entries.map(e=>e[0]);
  const vals = entries.map(e=>parseFloat(e[1]));
  const ctx = document.getElementById('weightChart').getContext('2d');
  if(wChart) wChart.destroy();
  wChart = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[{ data:vals, borderColor:'#78dc8c', backgroundColor:'rgba(120,220,140,0.08)', pointBackgroundColor:'#78dc8c', pointRadius:4, borderWidth:2, tension:0.3, fill:true }] },
    options: JSON.parse(JSON.stringify(chartDefaults))
  });
}

function renderCalChart(){
  const entries = Object.entries(db.calories)
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([date,es])=>({ date, total: es.reduce((s,e)=>s+e.amount,0) }));
  const wrap = document.getElementById('calChartWrap');
  if(entries.length < 2){ wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  const ctx = document.getElementById('calChart').getContext('2d');
  if(cChart) cChart.destroy();
  const opts = JSON.parse(JSON.stringify(chartDefaults));
  opts.scales.x.ticks.color = 'rgba(240,192,96,0.45)';
  opts.scales.y.ticks.color = 'rgba(240,192,96,0.45)';
  opts.scales.x.grid.color = 'rgba(240,192,96,0.07)';
  opts.scales.y.grid.color = 'rgba(240,192,96,0.07)';
  cChart = new Chart(ctx, {
    type:'line',
    data:{ labels: entries.map(e=>e.date), datasets:[{ data: entries.map(e=>e.total), borderColor:'#f0c060', backgroundColor:'rgba(240,192,96,0.08)', pointBackgroundColor:'#f0c060', pointRadius:4, borderWidth:2, tension:0.3, fill:true }] },
    options: opts
  });
}

/* ---- INIT ---- */
function render(){
  renderCalories();
  renderWeight();
  renderWeightChart();
  renderCalChart();
}

document.getElementById('datePicker').value = todayStr();
document.getElementById('datePicker').max = todayStr();
document.getElementById('datePicker').addEventListener('change', render);
document.getElementById('calInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addCalories(); });
document.getElementById('weightInput').addEventListener('keydown', e=>{ if(e.key==='Enter') saveWeight(); });

render();
</script>
</body>
</html>
